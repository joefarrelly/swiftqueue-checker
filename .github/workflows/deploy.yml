name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh "$USER@$HOST" '
            cd ~/apps/swiftqueue-checker && git pull &&
            cd ~/apps && docker compose up -d --build swiftqueue-checker-web &&
            mkdir -p ~/apps/deploy-times &&
            date -u +%Y-%m-%dT%H:%M:%SZ > ~/apps/deploy-times/swiftqueue-checker-web
          '
