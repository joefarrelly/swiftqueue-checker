name: Restrict merges to main
on:
  pull_request:
    branches: [main]

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Only allow merges from dev
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "PRs to main must come from 'dev', not '${{ github.head_ref }}'."
            exit 1
          fi
