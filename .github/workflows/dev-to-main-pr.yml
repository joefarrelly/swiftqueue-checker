name: Maintain dev→main PR

on:
  pull_request:
    branches: [dev]
    types: [closed]

jobs:
  upsert-release-pr:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Create or update dev→main PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          MERGED_BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
        run: |
          OWNER="${REPO%%/*}"
          EXISTING=$(gh pr list \
            --repo "$REPO" \
            --base main \
            --head "${OWNER}:dev" \
            --json number,body)

          PR_NUMBER=$(echo "$EXISTING" | jq -r '.[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --repo "$REPO" \
              --base main \
              --head dev \
              --title "dev into main" \
              --body "- $MERGED_BRANCH"
          else
            BODY=$(echo "$EXISTING" | jq -r '.[0].body')

            if echo "$BODY" | grep -qF "- $MERGED_BRANCH"; then
              echo "Branch already listed, skipping."
            else
              gh pr edit "$PR_NUMBER" \
                --repo "$REPO" \
                --body "${BODY}"$'\n'"- $MERGED_BRANCH"
            fi
          fi
