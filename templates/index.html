<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title>SwiftQueue Checker</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.scope.includes('/static') && r.unregister()));</script>
</head>
<body>
<main>
    <h1>SwiftQueue Checker</h1>
    <p class="subtitle">Get notified the moment an appointment slot opens up before your target date.</p>

    <div id="registered-state" hidden>
        <div class="registered-info">
            <p id="registered-detail"></p>
            {% if telegram_bot %}
            <a id="telegram-link-btn" href="#" target="_blank" rel="noopener" class="btn-telegram" hidden onclick="startTelegramLinkPoll()">
                Link Telegram
            </a>
            <div id="telegram-share" hidden>
                <p class="telegram-share-label">Telegram linked. Share this link to add more accounts:</p>
                <div class="telegram-share-row">
                    <input id="telegram-share-url" type="text" readonly>
                    <button id="telegram-copy-btn" type="button" onclick="copyTelegramLink()">Copy</button>
                </div>
            </div>
            {% endif %}
        </div>

        <div id="slots-card" class="notifications-card">
            <h2>Available slots</h2>
            <ul id="slots-list">
                <li id="no-slots" class="no-alerts">No matching slots right now — checking every minute.</li>
            </ul>
        </div>
    </div>

    <form id="register-form" novalidate>
        <div id="form-fields">
            <div class="field">
                <label for="area_url">Area</label>
                <select name="area_url" id="area_url" required>
                    <option value="">Select an area…</option>
                    {% for name, url in areas.items() %}
                    <option value="{{ url }}">{{ name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="field">
                <label for="target_date">Notify me if a slot is available on or before</label>
                <input type="date" name="target_date" id="target_date" required>
            </div>
        </div>

        <p id="error-msg" hidden></p>

        <button type="submit" id="submit-btn" class="btn-primary">Get Notified</button>
    </form>
</main>

<script>
    const TELEGRAM_BOT = {{ telegram_bot | tojson }};
</script>
<script src="/static/app.js"></script>
</body>
</html>
