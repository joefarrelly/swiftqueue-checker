<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribe — SwiftQueue Checker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
    {% if done %}
        <h1>Unsubscribed</h1>
        <p>You won't receive any more SwiftQueue alerts.</p>
        <a href="/" class="btn-primary" style="margin-top:1rem">Register again</a>
    {% else %}
        <h1>Unsubscribe</h1>
        <p>Are you sure you want to stop receiving SwiftQueue alerts?</p>
        <form method="POST">
            <button type="submit" class="btn-primary">Yes, unsubscribe me</button>
        </form>
        <a href="/" class="secondary-link">Cancel</a>
    {% endif %}
</main>
</body>
</html>
