services:
  web:
    build: .
    command: gunicorn "app:create_app()" --bind 0.0.0.0:5000 --workers 2
    volumes:
      - ./data:/app/data
    env_file: .env
    restart: unless-stopped
    networks:
      - web

  checker:
    build: .
    command: python -m checker.worker
    volumes:
      - ./data:/app/data
    env_file: .env
    restart: unless-stopped
    networks:
      - web

networks:
  web:
    external: true
