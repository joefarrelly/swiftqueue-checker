services:
  web:
    build: .
    command: flask --app "app:create_app()" run --host 0.0.0.0 --debug
    volumes:
      - .:/app
      - swiftqueue_data:/app/data
    ports:
      - "5000:5000"
    env_file: .env
    restart: unless-stopped

  checker:
    build: .
    command: python -m checker.worker
    volumes:
      - .:/app
      - swiftqueue_data:/app/data
    env_file: .env
    restart: unless-stopped

volumes:
  swiftqueue_data:
